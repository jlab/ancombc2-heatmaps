name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          pip install .

      - name: Installation test
        run: |
          pip show ancombc2-heatmaps
  
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: ruff
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: install dependencies
        run: python -m pip install --upgrade pip
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: lint
        run: |
          pip install -q ruff
          ruff check ancombc2_heatmaps/*.py          
